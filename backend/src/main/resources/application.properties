spring.application.name=footix-backend
server.port=8080

# H2 Database
spring.datasource.url=jdbc:h2:mem:footix;DB_CLOSE_DELAY=-1
spring.datasource.driverClassName=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.h2.console.enabled=true

# World Cup API (token kept server-side — never exposed to frontend)
worldcup.api.base-url=https://worldcup26.ir
worldcup.api.email=
worldcup.api.password=
worldcup.api.token=

# CORS
cors.allowed-origins=http://localhost:5173,http://localhost:3000

# Live updates
footix.poll-interval-ms=15000
